<!doctype html>
<html lang="ko">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>neutda-ai · 로그</title>
        <style>
            :root {
                --bg: #0f1117;
                --panel: #171a23;
                --border: #272b38;
                --text: #e7e9ee;
                --muted: #9aa3b2;
                --accent: #6c8cff;
                --ok: #3fb950;
                --err: #f85149;
                --warn: #d29922;
            }
            * {
                box-sizing: border-box;
            }
            body {
                margin: 0;
                font-family:
                    ui-sans-serif, system-ui, "Segoe UI", "Malgun Gothic",
                    sans-serif;
                background: var(--bg);
                color: var(--text);
                height: 100vh;
                display: flex;
                flex-direction: column;
            }
            header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 12px;
                padding: 14px 20px;
                border-bottom: 1px solid var(--border);
                flex-wrap: wrap;
            }
            h1 {
                font-size: 17px;
                margin: 0;
            }
            a {
                color: var(--accent);
                text-decoration: none;
                font-size: 13px;
            }
            .tools {
                display: flex;
                align-items: center;
                gap: 10px;
                flex-wrap: wrap;
            }
            .btn {
                font-size: 13px;
                padding: 7px 12px;
                border-radius: 8px;
                border: 1px solid var(--border);
                background: var(--panel);
                color: var(--text);
                cursor: pointer;
            }
            .btn:hover {
                border-color: var(--accent);
            }
            .btn-danger {
                background: rgba(248, 81, 73, 0.14);
                border-color: rgba(248, 81, 73, 0.4);
                color: #ff9c95;
            }
            .btn-danger:hover {
                border-color: var(--err);
            }
            .updated {
                font-size: 12px;
                color: var(--muted);
            }
            .grid {
                flex: 1;
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 0;
                min-height: 0;
            }
            .col {
                display: flex;
                flex-direction: column;
                min-height: 0;
                border-right: 1px solid var(--border);
            }
            .col:last-child {
                border-right: 0;
            }
            .col-head {
                padding: 10px 16px;
                font-size: 13px;
                font-weight: 600;
                border-bottom: 1px solid var(--border);
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            .col-head.err {
                color: var(--err);
            }
            .count {
                font-size: 11px;
                color: var(--muted);
                font-variant-numeric: tabular-nums;
            }
            .logs {
                flex: 1;
                overflow-y: auto;
                padding: 8px 0;
                font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
                font-size: 12.5px;
            }
            .row {
                display: flex;
                gap: 10px;
                padding: 3px 16px;
                white-space: pre-wrap;
                word-break: break-word;
                border-bottom: 1px solid rgba(39, 43, 56, 0.5);
            }
            .row:hover {
                background: rgba(255, 255, 255, 0.03);
            }
            .ts {
                color: var(--muted);
                flex: 0 0 auto;
            }
            .lv {
                flex: 0 0 auto;
                font-weight: 700;
                width: 46px;
            }
            .lv-debug {
                color: var(--muted);
            }
            .lv-info {
                color: var(--accent);
            }
            .lv-warn {
                color: var(--warn);
            }
            .lv-error {
                color: var(--err);
            }
            .msg {
                flex: 1;
            }
            .empty {
                color: var(--muted);
                padding: 14px 16px;
                font-size: 13px;
            }
            .filter-bar {
                display: flex;
                align-items: center;
                gap: 8px;
                flex-wrap: wrap;
                padding: 10px 16px;
                border-bottom: 1px solid var(--border);
                background: #0c0e14;
            }
            .filter-bar label {
                font-size: 12px;
                color: var(--muted);
            }
            .filter-bar input {
                background: #0d0f15;
                border: 1px solid var(--border);
                border-radius: 7px;
                color: var(--text);
                padding: 6px 10px;
                font-size: 13px;
                font-family: inherit;
            }
            .filter-bar input#fText {
                flex: 1;
                min-width: 180px;
            }
            mark {
                background: rgba(210, 153, 34, 0.45);
                color: #fff;
                border-radius: 2px;
                padding: 0 1px;
            }
        </style>
    </head>
    <body>
        <header>
            <h1>실시간 로그</h1>
            <div class="tools">
                <button class="btn btn-danger" id="btnTestError">
                    오류 로그 테스트
                </button>
                <button class="btn" id="btnClear">화면 지우기</button>
                <span class="updated" id="updated"></span>
            </div>
        </header>

        <div class="filter-bar">
            <input
                id="fText"
                type="text"
                placeholder="텍스트 검색 (메시지 내용)"
            />
            <label for="fFrom">시작</label>
            <input id="fFrom" type="datetime-local" step="1" />
            <label for="fTo">종료</label>
            <input id="fTo" type="datetime-local" step="1" />
            <button class="btn" id="btnFilterClear">필터 초기화</button>
        </div>

        <div class="grid">
            <div class="col">
                <div class="col-head">
                    <span>전체 로그</span
                    ><span class="count" id="cAll">0건</span>
                </div>
                <div class="logs" id="allLogs">
                    <div class="empty">로그 대기 중…</div>
                </div>
            </div>
            <div class="col">
                <div class="col-head err">
                    <span>오류 로그</span
                    ><span class="count" id="cErr">0건</span>
                </div>
                <div class="logs" id="errLogs">
                    <div class="empty">오류 없음</div>
                </div>
            </div>
        </div>

        <script>
            const $ = (id) => document.getElementById(id);
            const esc = (s) =>
                String(s).replace(
                    /[&<>]/g,
                    (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" })[c],
                );
            let hideBeforeId = 0; // "화면 지우기"용 필터
            let lastAll = [];
            let lastErr = [];

            const highlight = (msg, q) => {
                const safe = esc(msg);
                if (!q) return safe;
                const re = new RegExp(
                    "(" + q.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + ")",
                    "gi",
                );
                return safe.replace(re, "<mark>$1</mark>");
            };

            function rowHtml(e, q) {
                const t = new Date(e.ts).toLocaleTimeString("ko-KR", {
                    hour12: false,
                });
                return `<div class="row"><span class="ts">${t}</span><span class="lv lv-${e.level}">${e.level.toUpperCase()}</span><span class="msg">${highlight(e.message, q)}</span></div>`;
            }

            function currentFilter() {
                const q = $("fText").value.trim().toLowerCase();
                const fromV = $("fFrom").value;
                const toV = $("fTo").value;
                return {
                    q,
                    from: fromV ? new Date(fromV).getTime() : null,
                    to: toV ? new Date(toV).getTime() : null,
                };
            }

            function passes(e, f) {
                if (e.id <= hideBeforeId) return false;
                if (f.q && !e.message.toLowerCase().includes(f.q)) return false;
                const ts = new Date(e.ts).getTime();
                if (f.from != null && ts < f.from) return false;
                if (f.to != null && ts > f.to) return false;
                return true;
            }

            function render(el, items, emptyText, f) {
                const shown = items.filter((e) => passes(e, f));
                if (shown.length === 0) {
                    el.innerHTML = `<div class="empty">${emptyText}</div>`;
                    return 0;
                }
                const atBottom =
                    el.scrollHeight - el.scrollTop - el.clientHeight < 40;
                el.innerHTML = shown.map((e) => rowHtml(e, f.q)).join("");
                if (atBottom) el.scrollTop = el.scrollHeight;
                return shown.length;
            }

            function applyRender() {
                const f = currentFilter();
                const active = f.q || f.from != null || f.to != null;
                $("cAll").textContent =
                    render($("allLogs"), lastAll, "조건에 맞는 로그 없음", f) +
                    (active ? "건(필터)" : "건");
                $("cErr").textContent =
                    render($("errLogs"), lastErr, "조건에 맞는 오류 없음", f) +
                    (active ? "건(필터)" : "건");
            }

            async function refresh() {
                try {
                    lastAll = (
                        await (
                            await fetch("/api/logs?level=all&limit=500")
                        ).json()
                    ).items;
                    lastErr = (
                        await (
                            await fetch("/api/logs?level=error&limit=500")
                        ).json()
                    ).items;
                    applyRender();
                    $("updated").textContent =
                        "갱신 " +
                        new Date().toLocaleTimeString("ko-KR", {
                            hour12: false,
                        });
                } catch (e) {
                    $("updated").textContent = "조회 실패: " + e.message;
                }
            }

            ["fText", "fFrom", "fTo"].forEach((id) =>
                $(id).addEventListener("input", applyRender),
            );
            $("btnFilterClear").addEventListener("click", () => {
                $("fText").value = "";
                $("fFrom").value = "";
                $("fTo").value = "";
                applyRender();
            });

            $("btnTestError").addEventListener("click", async () => {
                try {
                    const r = await fetch("/api/logs/test-error", {
                        method: "POST",
                    });
                    const d = await r.json().catch(() => ({}));
                    $("updated").textContent =
                        `강제 오류: ${d.model ?? "?"} [${d.scenario ?? "?"}] HTTP ${d.status ?? r.status}`;
                } catch (e) {
                    $("updated").textContent = "요청 실패: " + e.message;
                }
                refresh();
            });

            $("btnClear").addEventListener("click", async () => {
                const all = (
                    await (await fetch("/api/logs?level=all&limit=1")).json()
                ).items;
                hideBeforeId = all.length ? all[all.length - 1].id : 0;
                refresh();
            });

            refresh();
            setInterval(refresh, 1500);
        </script>
        <script src="/nav.js"></script>
    </body>
</html>
